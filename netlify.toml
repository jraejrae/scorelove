[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Force HTTPS
[[redirects]]
  from = "http://scorelove.com/*"
  to = "https://scorelove.com/:splat"
  status = 301
  force = true

# Redirect www to non-www (or vice versa — pick one)
[[redirects]]
  from = "https://www.scorelove.com/*"
  to = "https://scorelove.com/:splat"
  status = 301
  force = true
