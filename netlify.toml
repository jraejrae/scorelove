[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' *.list-manage.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'"

# Force HTTPS
[[redirects]]
  from = "http://scorelove.com/*"
  to = "https://scorelove.com/:splat"
  status = 301
  force = true

# Redirect www to non-www (or vice versa — pick one)
[[redirects]]
  from = "https://www.scorelove.com/*"
  to = "https://scorelove.com/:splat"
  status = 301
  force = true
